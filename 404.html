<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — ELS911</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/styles.css" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%231a3a6b'/><path d='M0 52 h100 v36 Q100 100 88 100 H12 Q0 100 0 88 Z' fill='%23c0392b'/><text x='50' y='34' font-size='28' fill='white' font-weight='bold' font-family='sans-serif' text-anchor='middle' dominant-baseline='middle'>ELS</text><text x='50' y='72' font-size='28' fill='white' font-weight='bold' font-family='sans-serif' text-anchor='middle' dominant-baseline='middle'>911</text></svg>" />

  <style>
    .nf-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      background:
        radial-gradient(ellipse at 30% 30%, rgba(192,57,43,.10) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-white) 0%, var(--bg-gray) 100%);
      text-align: center;
    }
    .nf-card {
      max-width: 520px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 3rem 2rem;
      box-shadow: var(--shadow);
    }
    .nf-code {
      font-family: 'Cabin', sans-serif;
      font-size: clamp(4rem, 12vw, 6.5rem);
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: .5rem;
    }
    .nf-title {
      font-family: 'Cabin', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .5rem;
    }
    .nf-msg {
      color: var(--text-muted);
      margin-bottom: 1.75rem;
      line-height: 1.65;
    }
    .nf-actions { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-card">
      <div class="nf-code">404</div>
      <div class="nf-title">Page Not Found</div>
      <p class="nf-msg">The page you&rsquo;re looking for doesn&rsquo;t exist or has moved. Let&rsquo;s get you back on track.</p>
      <div class="nf-actions">
        <a href="/" class="btn-primary">Back to Home &rarr;</a>
        <a href="/#contact" class="btn-outline">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
